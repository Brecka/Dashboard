<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Home Screen</title>
  <style>
    :root{
      --bg1:#07121f;      /* deep navy */
      --bg2:#0b1f3a;      /* navy */
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.72);
      --soft:rgba(255,255,255,.55);
      --border:rgba(255,255,255,.14);
      --shadow: 0 12px 40px rgba(0,0,0,.35);
      --radius: 22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background: radial-gradient(1200px 700px at 10% 10%, rgba(255,255,255,.10), transparent 55%),
                  radial-gradient(900px 600px at 90% 20%, rgba(120,160,255,.10), transparent 60%),
                  linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height:100vh;
      display:flex;
      padding:18px;
    }
    .wrap{
      width:100%;
      max-width:1100px;
      margin:auto;
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:16px;
      align-items:stretch;
    }
    @media (max-width: 900px){
      .wrap{grid-template-columns:1fr}
    }
    .card{
      background: linear-gradient(180deg, var(--card), rgba(255,255,255,.04));
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:18px;
      overflow:hidden;
      position:relative;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }
    .time{
      font-size:54px;
      letter-spacing:-1px;
      line-height:1;
      margin:0;
    }
    .date{
      margin-top:6px;
      color:var(--muted);
      font-size:16px;
    }
    .mode{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
    }
    .hero{
      margin-top:18px;
      padding:18px;
      border-radius: calc(var(--radius) - 6px);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
    }
    .headline{
      font-size:20px;
      color:var(--muted);
      margin:0 0 8px 0;
    }
    .mantra{
      font-size:30px;
      line-height:1.2;
      margin:0;
      letter-spacing:-.2px;
    }
    .subline{
      margin-top:12px;
      color:var(--soft);
      font-size:14px;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    button, a.btn{
      appearance:none;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color:var(--text);
      padding:10px 14px;
      border-radius: 14px;
      font-size:14px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      transition: transform .08s ease, background .2s ease;
    }
    button:hover, a.btn:hover{ background: rgba(255,255,255,.12); }
    button:active, a.btn:active{ transform: translateY(1px); }
    .mini{
      color:var(--muted);
      font-size:13px;
      margin-top:14px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .right .section-title{
      margin:0 0 10px 0;
      color:var(--muted);
      font-size:14px;
      letter-spacing:.2px;
      text-transform:uppercase;
    }
    .tile{
      padding:14px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      margin-bottom:12px;
    }
    .tile h3{
      margin:0 0 8px 0;
      font-size:16px;
      color:var(--text);
    }
    .tile p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.35;
    }
    iframe{
      width:100%;
      border:0;
      border-radius: 16px;
      background: rgba(0,0,0,.2);
    }
    .embed{
      margin-top:12px;
    }
    .footerhint{
      margin-top:10px;
      color: rgba(255,255,255,.45);
      font-size:12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card left">
      <div class="topbar">
        <div>
          <h1 class="time" id="time">--:--</h1>
          <div class="date" id="date">---</div>
        </div>
        <div class="mode" id="modePill">Mode</div>
      </div>

      <div class="hero">
        <p class="headline" id="headline">—</p>
        <p class="mantra" id="mainText">—</p>
        <div class="subline" id="subline">—</div>

        <div class="actions">
          <a class="btn" id="primaryBtn" href="#" target="_blank" rel="noopener">Open</a>
          <button id="shuffleBtn">Shuffle</button>
          <button id="toggleBtn">Toggle Morning/Evening</button>
        </div>
      </div>

      <div class="embed" id="embedWrap"></div>

      <div class="mini">
        <div id="focusLine">Focus: —</div>
        <div id="noteLine">—</div>
      </div>

      <div class="footerhint">
        Tip: edit the content objects in this file (mantras, reflections, links). No backend needed.
      </div>
    </div>

    <div class="card right">
      <div class="section-title">Quick Tiles</div>

      <div class="tile" id="tile1">
        <h3 id="tile1h">—</h3>
        <p id="tile1p">—</p>
      </div>

      <div class="tile" id="tile2">
        <h3 id="tile2h">—</h3>
        <p id="tile2p">—</p>
      </div>

      <div class="tile" id="tile3">
        <h3 id="tile3h">—</h3>
        <p id="tile3p">—</p>
      </div>
    </div>
  </div>

<script>
  // ====== EDIT THESE ======
  const content = {
    morning: {
      headline: "Good morning.",
      mantras: [
        "Move slow. Start clean. Finish strong.",
        "Calm is power.",
        "I choose clarity over chaos.",
        "I do the next right thing."
      ],
      subline: "Breathe first. Then begin.",
      primary: { label: "Start meditation", url: "https://www.youtube.com/results?search_query=10+minute+guided+meditation" },
      embed: { type: "youtube", id: "inpok4MKVLM" }, // 10-min meditation example
      tiles: [
        { h: "Today’s tone", p: "Calm + focused. One priority." },
        { h: "Movement", p: "Short workout > perfect workout." },
        { h: "Logistics", p: "Check weather + commute only once." }
      ],
      focus: "One thing that makes everything easier",
      note: "Keep it light. Keep it moving."
    },
    evening: {
      headline: "Welcome home.",
      reflections: [
        "What went well today?",
        "What needs to be released?",
        "What do you want tomorrow to feel like?",
        "Name one win—small counts."
      ],
      subline: "Decompress. Reset. Soft landing.",
      primary: { label: "Play unwind", url: "https://open.spotify.com/search/lofi%20unwind" },
      embed: { type: "spotify", url: "https://open.spotify.com/embed/playlist/37i9dQZF1DX4sWSpwq3LiO" }, // replace with your playlist
      tiles: [
        { h: "Unwind", p: "Music on. Lights low. Phone down." },
        { h: "Body", p: "5–10 min stretch. Then relax." },
        { h: "Tomorrow", p: "Set clothes + first task." }
      ],
      focus: "Soft and steady",
      note: "You’re allowed to rest."
    }
  };

  // ====== LOGIC ======
  let manualMode = null; // "morning" | "evening" | null

  function isMorningByTime(d){
    const h = d.getHours();
    return h >= 5 && h < 12;
  }

  function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
  }

  function setEmbed(mode){
    const wrap = document.getElementById("embedWrap");
    wrap.innerHTML = "";
    const cfg = content[mode].embed;

    if (cfg.type === "youtube"){
      const iframe = document.createElement("iframe");
      iframe.height = "360";
      iframe.src = `https://www.youtube.com/embed/${cfg.id}?rel=0`;
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      iframe.allowFullscreen = true;
      wrap.appendChild(iframe);
    } else if (cfg.type === "spotify"){
      const iframe = document.createElement("iframe");
      iframe.height = "380";
      iframe.src = cfg.url;
      iframe.allow = "autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture";
      wrap.appendChild(iframe);
    }
  }

  function render(mode){
    const now = new Date();
    document.getElementById("modePill").textContent = mode === "morning" ? "Morning Mode" : "Evening Mode";

    const headline = document.getElementById("headline");
    const mainText = document.getElementById("mainText");
    const subline = document.getElementById("subline");
    const primaryBtn = document.getElementById("primaryBtn");

    headline.textContent = content[mode].headline;

    if (mode === "morning"){
      mainText.textContent = pick(content.morning.mantras);
      subline.textContent = content.morning.subline;
      primaryBtn.textContent = content.morning.primary.label;
      primaryBtn.href = content.morning.primary.url;
    } else {
      mainText.textContent = pick(content.evening.reflections);
      subline.textContent = content.evening.subline;
      primaryBtn.textContent = content.evening.primary.label;
      primaryBtn.href = content.evening.primary.url;
    }

    setEmbed(mode);

    // tiles
    const tiles = content[mode].tiles;
    document.getElementById("tile1h").textContent = tiles[0].h;
    document.getElementById("tile1p").textContent = tiles[0].p;
    document.getElementById("tile2h").textContent = tiles[1].h;
    document.getElementById("tile2p").textContent = tiles[1].p;
    document.getElementById("tile3h").textContent = tiles[2].h;
    document.getElementById("tile3p").textContent = tiles[2].p;

    document.getElementById("focusLine").textContent = "Focus: " + content[mode].focus;
    document.getElementById("noteLine").textContent = content[mode].note;
  }

  function tick(){
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    const hh = ((h + 11) % 12) + 1;
    const mm = String(m).padStart(2, "0");
    const ampm = h >= 12 ? "PM" : "AM";
    document.getElementById("time").textContent = `${hh}:${mm} ${ampm}`;

    const opts = { weekday:"long", month:"long", day:"numeric" };
    document.getElementById("date").textContent = now.toLocaleDateString(undefined, opts);

    const mode = manualMode || (isMorningByTime(now) ? "morning" : "evening");
    return mode;
  }

  let currentMode = tick();
  render(currentMode);

  setInterval(() => {
    const mode = tick();
    if (mode !== currentMode){
      currentMode = mode;
      render(currentMode);
    }
  }, 1000);

  document.getElementById("shuffleBtn").onclick = () => render(currentMode);

  document.getElementById("toggleBtn").onclick = () => {
    manualMode = (currentMode === "morning") ? "evening" : "morning";
    currentMode = manualMode;
    render(currentMode);
  };
</script>
</body>
</html>
