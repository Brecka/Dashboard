<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  <style>
    :root{
      --bg1:#0b1f3a;
      --bg2:#07121f;
      --bg3:#112a4a;
      --card: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --muted2: rgba(255,255,255,.55);
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --radius: 22px;
    }

    /* Premium animated background */
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg1));
      background-size: 400% 400%;
      animation: gradientMove 20s ease infinite;
      min-height:100vh;
      display:flex;
      padding:18px;
      box-sizing:border-box;
    }
    @keyframes gradientMove{
      0%{ background-position: 0% 50%; }
      50%{ background-position: 100% 50%; }
      100%{ background-position: 0% 50%; }
    }

    .wrap{
      width: min(1200px, 100%);
      margin: 0 auto;
      display:grid;
      grid-template-columns: 1.25fr .9fr;
      gap: 18px;
      align-items:start;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap: 14px;
    }

    .timeBlock .time{
      font-size: clamp(42px, 7vw, 64px);
      font-weight: 750;
      line-height: 1.0;
      letter-spacing: -0.02em;
      text-shadow: 0 0 40px rgba(255,255,255,.15);
    }
    .timeBlock .date{
      margin-top: 6px;
      font-size: 16px;
      color: var(--muted);
    }

    .pill{
      border:1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--muted);
      background: rgba(255,255,255,.04);
      font-size: 13px;
      white-space:nowrap;
      align-self:flex-start;
    }

    .hero{
      margin-top: 14px;
      padding: 18px;
      border-radius: var(--radius);
      border:1px solid var(--border);
      background: rgba(0,0,0,.14);
    }
    .hero .small{
      color: var(--muted2);
      font-size: 13px;
      letter-spacing: .01em;
    }
    .hero h1{
      margin: 6px 0 6px;
      font-size: 30px;
      line-height:1.15;
      letter-spacing: -0.01em;
    }
    .hero .sub{
      color: var(--muted);
      margin: 0 0 14px;
      font-size: 14px;
    }

    .btnRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    button{
      appearance:none;
      border:1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      cursor:pointer;
    }
    button:hover{ background: rgba(255,255,255,.10); }

    .embed{
      margin-top: 14px;
      border-radius: var(--radius);
      overflow:hidden;
      border:1px solid var(--border);
      background: rgba(0,0,0,.18);
    }
    iframe{
      width:100%;
      height: 360px;
      border:0;
      display:block;
    }

    .footerLine{
      margin-top: 12px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      color: var(--muted2);
      font-size: 12px;
    }

    .side h2{
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .tile{
      padding: 14px;
      border-radius: var(--radius);
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      margin-bottom: 12px;
    }
    .tile .h{
      font-weight: 650;
      margin-bottom: 6px;
    }
    .tile .p{
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      white-space: pre-line;
    }

    @media (max-width: 900px){
      .wrap{ grid-template-columns: 1fr; }
      iframe{ height: 300px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- LEFT -->
    <div class="card">
      <div class="top">
        <div class="timeBlock">
          <div class="time" id="time">--:--</div>
          <div class="date" id="date">---</div>
        </div>
        <div class="pill" id="modePill">Evening Mode</div>
      </div>

      <div class="hero">
        <div class="small" id="greeting">Welcome home.</div>
        <h1 id="headline">What needs to be released?</h1>
        <div class="sub" id="subhead">Decompress. Reset. Soft landing.</div>

        <div class="btnRow">
          <button id="playBtn">Play unwind</button>
          <button id="shuffleBtn">Shuffle</button>
          <button id="toggleBtn">Toggle Morning/Evening</button>
        </div>
      </div>

      <div class="embed">
        <!-- Replace with your own Spotify embed if you want -->
        <iframe id="spotifyFrame"
          src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4sWSpwq3LiO?utm_source=generator"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy"></iframe>
      </div>

      <div class="footerLine">
        <div id="focusLine">Focus: soft and steady</div>
        <div id="affirmLine">You’re allowed to rest.</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="card side">
      <h2>Quick tiles</h2>

      <div class="tile">
        <div class="h" id="tile1h">Unwind</div>
        <div class="p" id="tile1p">Music on. Lights low. Phone down.</div>
      </div>

      <div class="tile">
        <div class="h" id="tile2h">Body</div>
        <div class="p" id="tile2p">5–10 min stretch. Then relax.</div>
      </div>

      <div class="tile">
        <div class="h" id="tile3h">Tomorrow</div>
        <div class="p" id="tile3p">Set clothes + first task.</div>
      </div>
    </div>
  </div>

  <script>
    // ---- CONTENT YOU CAN EDIT ----
    const CONTENT = {
      morning: {
        pill: "Morning Mode",
        greeting: "Good morning.",
        headline: "What matters most today?",
        subhead: "Calm start. Clear mind. One win.",
        focus: "Focus: steady and clean",
        affirm: "You’re in control of the pace.",
        tiles: [
          { h: "Weather", p: "Loading…" }, // we overwrite with live weather
          { h: "Today", p: "" },          // we overwrite with today’s date
          { h: "First move", p: "Water → 2 min breathe → start." }
        ]
      },
      evening: {
        pill: "Evening Mode",
        greeting: "Welcome home.",
        headline: "What needs to be released?",
        subhead: "Decompress. Reset. Soft landing.",
        focus: "Focus: soft and steady",
        affirm: "You’re allowed to rest.",
        tiles: [
          { h: "Weather", p: "Loading…" }, // live weather
          { h: "Today", p: "" },           // today’s date
          { h: "Tomorrow", p: "Set clothes + first task." }
        ]
      }
    };

    // ---- STATE ----
    let mode = localStorage.getItem("mode") || "evening";

    // ---- DOM ----
    const el = (id) => document.getElementById(id);

    function setMode(nextMode){
      mode = nextMode;
      localStorage.setItem("mode", mode);

      const m = CONTENT[mode];
      el("modePill").textContent = m.pill;
      el("greeting").textContent = m.greeting;
      el("headline").textContent = m.headline;
      el("subhead").textContent = m.subhead;
      el("focusLine").textContent = m.focus;
      el("affirmLine").textContent = m.affirm;

      el("tile1h").textContent = m.tiles[0].h;
      el("tile1p").textContent = m.tiles[0].p;

      el("tile2h").textContent = m.tiles[1].h;
      el("tile2p").textContent = m.tiles[1].p;

      el("tile3h").textContent = m.tiles[2].h;
      el("tile3p").textContent = m.tiles[2].p;

      // Always set tile2 date text
      el("tile2p").textContent = new Date().toLocaleDateString(undefined, {
        weekday: "long", month: "long", day: "numeric"
      });
    }

    function tickClock(){
      const now = new Date();
      el("time").textContent = now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      el("date").textContent = now.toLocaleDateString(undefined, { weekday:"long", month:"long", day:"numeric" });
    }

    async function loadWeather(lat, lon){
      try{
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
        );
        const data = await res.json();
        const w = data.current_weather;
        if (!w) return;
        el("tile1h").textContent = "Weather";
        el("tile1p").textContent = `${w.temperature}°C • Wind ${w.windspeed} km/h`;
      } catch(e){
        // leave as-is
      }
    }

    function tryGeoWeather(){
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        (pos) => loadWeather(pos.coords.latitude, pos.coords.longitude),
        () => { /* ignore */ },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 600000 }
      );
    }

    // ---- BUTTONS ----
    el("toggleBtn").addEventListener("click", () => {
      setMode(mode === "evening" ? "morning" : "evening");
      tryGeoWeather();
    });

    el("shuffleBtn").addEventListener("click", () => {
      // simple shuffle: flip affirmation lines
      const opts = [
        "You don’t need to rush.",
        "One thing at a time.",
        "Clean and calm.",
        "Soft landing. Safe body.",
        "Do less, better."
      ];
      el("affirmLine").textContent = opts[Math.floor(Math.random() * opts.length)];
    });

    el("playBtn").addEventListener("click", () => {
      // This doesn’t control Spotify directly (browser restrictions).
      // It just scrolls the embed into view and “nudges” you to press play.
      el("spotifyFrame").scrollIntoView({ behavior: "smooth", block: "center" });
    });

    // ---- INIT ----
    setMode(mode);
    tickClock();
    setInterval(tickClock, 1000 * 15);
    tryGeoWeather();
  </script>
</body>
</html>
