<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard</title>

<style>
:root{
  --bg1:#07121f;
  --bg2:#0b1f3a;
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.70);
  --muted2:rgba(255,255,255,.55);
  --card:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.10);
  --radius:22px;
  --shadow:0 20px 60px rgba(0,0,0,.35);
}

/* Stable luxury radial glow */
body{
  margin:0;
  font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:
    radial-gradient(900px 600px at 15% 20%, rgba(255,255,255,.06), transparent 60%),
    radial-gradient(700px 500px at 85% 25%, rgba(120,160,255,.08), transparent 60%),
    linear-gradient(160deg,var(--bg1),var(--bg2));
  min-height:100vh;
  display:flex;
  padding:18px;
  box-sizing:border-box;
}

.wrap{
  width:min(1200px,100%);
  margin:0 auto;
  display:grid;
  grid-template-columns:1.25fr .9fr;
  gap:18px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:var(--shadow);
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.time{
  font-size:60px;
  font-weight:700;
  letter-spacing:-1px;
  text-shadow:0 0 40px rgba(255,255,255,.15);
}
.date{
  margin-top:6px;
  font-size:15px;
  color:var(--muted);
}

.pill{
  border:1px solid var(--border);
  border-radius:999px;
  padding:8px 14px;
  font-size:13px;
  color:var(--muted);
  background:rgba(255,255,255,.04);
}

.hero{
  margin-top:14px;
  padding:18px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  background:rgba(0,0,0,.15);
}

.hero small{
  color:var(--muted2);
}

.hero h1{
  margin:6px 0;
  font-size:30px;
  letter-spacing:-.3px;
}

.hero p{
  margin:0 0 14px;
  color:var(--muted);
  font-size:14px;
}

.btnRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  border:1px solid var(--border);
  border-radius:14px;
  background:rgba(255,255,255,.06);
  color:var(--text);
  padding:10px 14px;
  cursor:pointer;
  font-size:14px;
}

button:hover{
  background:rgba(255,255,255,.10);
}

.embed{
  margin-top:14px;
  border-radius:var(--radius);
  overflow:hidden;
  border:1px solid var(--border);
}

iframe{
  width:100%;
  height:360px;
  border:0;
}

.footer{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted2);
}

.side h2{
  margin:0 0 12px;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.15em;
  color:var(--muted);
}

.tile{
  padding:14px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  background:rgba(255,255,255,.04);
  margin-bottom:12px;
}

.tile .h{
  font-weight:600;
  margin-bottom:6px;
}

.tile .p{
  font-size:13px;
  color:var(--muted);
}

@media(max-width:900px){
  .wrap{grid-template-columns:1fr;}
  iframe{height:300px;}
}
</style>
</head>

<body>
<div class="wrap">

<!-- LEFT -->
<div class="card">
  <div class="top">
    <div>
      <div class="time" id="time"></div>
      <div class="date" id="date"></div>
    </div>
    <div class="pill" id="mode">Evening Mode</div>
  </div>

  <div class="hero">
    <small id="greeting">Welcome home.</small>
    <h1 id="headline">What needs to be released?</h1>
    <p id="sub">Decompress. Reset. Soft landing.</p>

    <div class="btnRow">
      <button id="toggle">Toggle Mode</button>
      <button id="shuffle">Shuffle Reflection</button>
    </div>
  </div>

  <div class="embed">
    <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4sWSpwq3LiO"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <div class="footer">
    <div id="focus">Focus: soft and steady</div>
    <div id="affirm">You’re allowed to rest.</div>
  </div>
</div>

<!-- RIGHT -->
<div class="card side">
  <h2>Quick Tiles</h2>

  <div class="tile">
    <div class="h" id="weatherH">Weather</div>
    <div class="p" id="weatherP">Loading…</div>
  </div>

  <div class="tile">
    <div class="h">Today</div>
    <div class="p" id="todayP"></div>
  </div>

  <div class="tile">
    <div class="h">Tomorrow</div>
    <div class="p">Set clothes + first task.</div>
  </div>
</div>

</div>

<script>
let mode = "evening";

function updateClock(){
  const now = new Date();
  document.getElementById("time").textContent =
    now.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
  document.getElementById("date").textContent =
    now.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
}
setInterval(updateClock,1000);
updateClock();

document.getElementById("todayP").textContent =
  new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});

async function loadWeather(lat,lon){
  try{
    const r = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
    );
    const data = await r.json();
    const w = data.current_weather;
    if(w){
      document.getElementById("weatherP").textContent =
        `${w.temperature}°C • Wind ${w.windspeed} km/h`;
    }
  }catch{}
}

if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos=>loadWeather(pos.coords.latitude,pos.coords.longitude)
  );
}

document.getElementById("toggle").onclick=()=>{
  if(mode==="evening"){
    mode="morning";
    document.getElementById("mode").textContent="Morning Mode";
    document.getElementById("greeting").textContent="Good morning.";
    document.getElementById("headline").textContent="What matters most today?";
    document.getElementById("sub").textContent="Calm start. Clear mind. One win.";
    document.getElementById("focus").textContent="Focus: steady and clean";
    document.getElementById("affirm").textContent="You’re in control of the pace.";
  }else{
    mode="evening";
    document.getElementById("mode").textContent="Evening Mode";
    document.getElementById("greeting").textContent="Welcome home.";
    document.getElementById("headline").textContent="What needs to be released?";
    document.getElementById("sub").textContent="Decompress. Reset. Soft landing.";
    document.getElementById("focus").textContent="Focus: soft and steady";
    document.getElementById("affirm").textContent="You’re allowed to rest.";
  }
};

document.getElementById("shuffle").onclick=()=>{
  const lines=[
    "One thing at a time.",
    "You don’t need to rush.",
    "Clean and calm.",
    "Soft landing.",
    "Do less, better."
  ];
  document.getElementById("affirm").textContent=
    lines[Math.floor(Math.random()*lines.length)];
};
</script>

</body>
</html>
